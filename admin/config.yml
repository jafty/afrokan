backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "src/assets/uploads"
public_folder: "/uploads"
site_url: "/"
locale: "fr"

collections:
  - name: "posts"
    label: "Articles"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Utilisez des tirets, ex: mon-article" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["restaurant", "salon", "boutique"] }
      - { label: "Date lisible", name: "dateLabel", widget: "string" }
      - { label: "Date ISO", name: "dateIso", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Extrait", name: "excerpt", widget: "text" }
      - { label: "Adresse", name: "address", widget: "string" }
      - { label: "Image principale", name: "coverImage", widget: "image" }
      - label: "Galerie"
        name: "galleryImages"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Contenu", name: "body", widget: "markdown" }
